# Meridian quickstart — gateway + two mock backends (no Kafka / audit).
#   docker compose up --build
# Gateway: http://localhost:8080
#
# Optional audit/Kafka stack: docker compose -f docker-compose.audit.yaml up -d
# Optional full demo with Kafka on the gateway process:
#   docker compose -f docker-compose.kafka-demo.yml up --build

services:
  backend-fast:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=fast
      - BASE_LATENCY_MS=50
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9001
    ports:
      - "9001:9001"

  backend-slow:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=slow
      - BASE_LATENCY_MS=300
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9002
    ports:
      - "9002:9002"

  meridian:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MERIDIAN_CONFIG=/app/config.yaml
    depends_on:
      - backend-fast
      - backend-slow
    volumes:
      - ./configs/mock_demo.yaml:/app/config.yaml:ro
