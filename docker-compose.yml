services:
  backend-fast:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=fast
      - BASE_LATENCY_MS=50
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9001
    ports:
      - "9101:9001"

  backend-slow:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=slow
      - BASE_LATENCY_MS=300
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9002
    ports:
      - "9102:9002"

  meridian:
    build: .
    ports:
      - "9080:8080"
    environment:
      - MERIDIAN_CONFIG=/app/config.yaml
    depends_on:
      - backend-fast
      - backend-slow
    volumes:
      - ./config.yaml:/app/config.yaml:ro
