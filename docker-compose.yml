services:
  backend-fast:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=fast
      - BASE_LATENCY_MS=50
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9001
    ports:
      - "9101:9001"

  backend-slow:
    build: ./mock_backend
    environment:
      - BACKEND_NAME=slow
      - BASE_LATENCY_MS=300
      - MODEL_NAME=demo-model
    command: uvicorn server:app --host 0.0.0.0 --port 9002
    ports:
      - "9102:9002"

  meridian:
    build: .
    ports:
      - "9080:8080"
    environment:
      - MERIDIAN_CONFIG=/app/config.yaml
    depends_on:
      - backend-fast
      - backend-slow
      - redpanda
    volumes:
      - ./config.yaml:/app/config.yaml:ro

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --set auto_create_topics_enabled=true
    ports:
      - "19092:19092"   # external Kafka API
      - "18081:8081"    # Schema Registry
      - "18082:8082"    # Redpanda HTTP Proxy
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-consumer:
    build: .
    command: >
      python -m meridian.audit.consumer
        --brokers redpanda:9092
        --topic meridian-audit-logs
        --batch-size 64
        --flush-interval 60
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped
