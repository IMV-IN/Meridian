name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check package version consistency
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          py = Path("pyproject.toml").read_text()
          init = Path("meridian/__init__.py").read_text()
          m_py = re.search(r'^version\s*=\s*"([^"]+)"', py, re.M)
          m_init = re.search(r'^__version__\s*=\s*"([^"]+)"', init, re.M)
          assert m_py and m_init, "version fields missing"
          assert m_py.group(1) == m_init.group(1), (
              f"pyproject {m_py.group(1)!r} != __init__ {m_init.group(1)!r}"
          )
          print(f"version ok: {m_py.group(1)}")
          PY

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy meridian

      - name: Run tests
        run: pytest -q

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: helm template (chart must render)
        run: helm template meridian ./deploy/helm/meridian >/dev/null
