name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check package version consistency
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          py = Path("pyproject.toml").read_text()
          init = Path("meridian/__init__.py").read_text()
          m_py = re.search(r'^version\s*=\s*"([^"]+)"', py, re.M)
          m_init = re.search(r'^__version__\s*=\s*"([^"]+)"', init, re.M)
          assert m_py and m_init, "version fields missing"
          assert m_py.group(1) == m_init.group(1), (
              f"pyproject {m_py.group(1)!r} != __init__ {m_init.group(1)!r}"
          )
          print(f"version ok: {m_py.group(1)}")
          PY

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy meridian

      - name: Run tests
        run: pytest -q

      - name: Bench harness smoke (mock overhead script)
        if: matrix.python-version == '3.11'
        run: python scripts/bench_overhead.py --requests 40 --concurrency 8 --warmup 5 --json

  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: helm template (chart must render)
        run: helm template meridian ./deploy/helm/meridian >/dev/null

  # Live process smoke: mock backend + Meridian + scripts/smoke_test.py
  gateway-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Start mock backend
        run: |
          BASE_LATENCY_MS=0 BACKEND_NAME=ci MODEL_NAME=demo-model \
            uvicorn mock_backend.server:app --host 127.0.0.1 --port 9001 &
          echo $! > /tmp/mock.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9001/v1/models && break
            sleep 0.5
          done
      - name: Write config
        run: |
          cat > /tmp/meridian-smoke.yaml <<'YAML'
          gateway:
            strategy: least_inflight
            default_max_tokens: 16
          health:
            interval_s: 30
            timeout_s: 2
            fail_threshold: 2
            success_threshold: 1
          backends:
            - name: ci-mock
              url: http://127.0.0.1:9001
              engine: mock
              model: demo-model
              weight: 1
              health_endpoint: /v1/models
          YAML
      - name: Start Meridian
        run: |
          MERIDIAN_CONFIG=/tmp/meridian-smoke.yaml \
            uvicorn meridian.api.main:app --host 127.0.0.1 --port 8080 &
          echo $! > /tmp/gw.pid
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8080/meridian/status && break
            sleep 0.5
          done
      - name: Smoke test
        run: python scripts/smoke_test.py --url http://127.0.0.1:8080 --model demo-model --wait 15
