# Default local config (also used when MERIDIAN_CONFIG is unset).
# Docker quickstart mounts configs/mock_demo.yaml instead.
#
# Rate limits are OFF by default so first runs are not confusing.
# Turn on rate_limit / auth / budgets when you need multi-tenant demos.

gateway:
  host: "0.0.0.0"
  port: 8080
  strategy: "least_inflight"

health:
  interval_s: 5
  timeout_s: 2
  fail_threshold: 2
  success_threshold: 1

logging:
  level: "INFO"
  jsonl_path: "./meridian_requests.jsonl"

rate_limit:
  enabled: false
  token_capacity: 60
  token_refill_rate: 10

backends:
  - name: "fast"
    url: "http://127.0.0.1:9001"
    engine: "mock"
    model: "demo-model"
    weight: 80
    tags: ["fast"]
    health_endpoint: "/v1/models"

  - name: "slow"
    url: "http://127.0.0.1:9002"
    engine: "mock"
    model: "demo-model"
    weight: 20
    tags: ["cheap"]
    health_endpoint: "/v1/models"
