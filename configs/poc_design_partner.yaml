# Design-partner PoC config — local Ollama, multi-tenant features on.
# NOT for production keys. Used by docs/internal/POC_REPORT.md validation recipe.
#
#   ollama pull qwen2.5:0.5b && ollama serve
#   MERIDIAN_CONFIG=configs/poc_design_partner.yaml \
#     uvicorn meridian.api.main:app --host 127.0.0.1 --port 18080

gateway:
  host: "127.0.0.1"
  port: 18080
  strategy: "least_inflight"
  prefill_weight: 1.0
  decode_weight: 4.0
  default_max_tokens: 64
  max_body_bytes: 10485760

health:
  interval_s: 10
  timeout_s: 3
  fail_threshold: 2
  success_threshold: 1

logging:
  level: "INFO"
  jsonl_path: "./poc_meridian_requests.jsonl"

rate_limit:
  enabled: true
  token_capacity: 120
  token_refill_rate: 20
  max_buckets: 10000
  idle_ttl_s: 3600

auth:
  enabled: true
  keys:
    # Pattern: mrdn_ + 20–40 alphanumeric (no other punctuation)
    - key: "mrdn_3kTyXq9Zm4PwR7sN8vBcDfGhJ"
      org_id: "acme"
      team_id: "eng"
    - key: "mrdn_1Aa2Bb3Cc4Dd5Ee6Ff7Gg8Hh"
      org_id: "finance"
      cost_admin: true
    - key: "mrdn_9Bv4QwX8Ty2Rs5Np7MfLkHgDc"
      org_id: "ops"
      ops_admin: true

budgets:
  enabled: true
  store: memory
  orgs:
    acme:
      daily:
        tokens: 5000000
        requests: 10000

pii:
  enabled: false

cost:
  enabled: true
  store: memory
  currency: "USD"
  max_window_days: 30
  default_prompt_per_1m: 0.15
  default_completion_per_1m: 0.60
  models:
    qwen2.5:0.5b:
      prompt_per_1m: 0.05
      completion_per_1m: 0.10

backends:
  - name: "ollama-poc"
    url: "http://127.0.0.1:11434"
    engine: "ollama"
    model: "qwen2.5:0.5b"
    weight: 1
    tags: ["gpu", "poc"]
    health_endpoint: "/v1/models"
