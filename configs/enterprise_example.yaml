# Enterprise-oriented example — NOT for docker-compose mock demos.
# Replace keys, backend URLs, and paths before use.
# See docs/ENTERPRISE_COST.md, docs/DEPLOY.md, docs/MILESTONES.md

gateway:
  host: "0.0.0.0"
  port: 8080
  strategy: "token_aware"
  prefill_weight: 1.0
  decode_weight: 4.0
  default_max_tokens: 256
  max_body_bytes: 10485760   # 10 MiB

health:
  interval_s: 5
  timeout_s: 2
  fail_threshold: 2
  success_threshold: 1

logging:
  level: "INFO"
  jsonl_path: "/var/lib/meridian/meridian_requests.jsonl"

rate_limit:
  enabled: true
  token_capacity: 60
  token_refill_rate: 10
  max_buckets: 100000
  idle_ttl_s: 3600
  org_overrides: {}
  # acme:
  #   token_capacity: 120
  #   token_refill_rate: 20

auth:
  enabled: true
  # Prefer secrets mount over inline keys in production:
  keys_file: "/secrets/keys.yaml"
  keys: []
  # Inline only for tiny PoCs:
  # keys:
  #   - key: "mrdn_REPLACE_WITH_LONG_RANDOM"
  #     org_id: "acme"
  #     team_id: "eng"
  #   - key: "mrdn_FINANCE_ADMIN_KEY"
  #     org_id: "finance"
  #     cost_admin: true
  #   - key: "mrdn_OPS_RELOAD_KEY"
  #     org_id: "ops"
  #     ops_admin: true

budgets:
  enabled: true
  store: sqlite
  sqlite_path: "/var/lib/meridian/meridian_usage.db"
  orgs:
    acme:
      daily:
        tokens: 5000000
        requests: 50000
      monthly:
        tokens: 100000000

pii:
  enabled: true
  policy: redact_and_replace
  entities: []   # all India pack types

cost:
  enabled: true
  store: sqlite
  sqlite_path: "/var/lib/meridian/meridian_cost.db"
  currency: "USD"
  max_window_days: 366
  default_prompt_per_1m: 0.15
  default_completion_per_1m: 0.60
  models: {}
  # "my-model":
  #   prompt_per_1m: 0.10
  #   completion_per_1m: 0.40

# Optional: session stickiness / tiering — enable only if backends are tagged
session_affinity:
  enabled: false
  header: "x-meridian-session"
  ttl_s: 600

tiering:
  enabled: false

backends:
  - name: "primary"
    url: "http://vllm-primary:8000"
    engine: "vllm"
    model: "your-model-id"
    weight: 1
    tags: ["general"]
    health_endpoint: "/v1/models"
    # auth_header: "Bearer upstream-secret"  # NOT the Meridian client key
