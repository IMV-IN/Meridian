# Mock demo for Docker Compose quickstart (no GPU, no auth, no rate limit).
# Mounted by docker-compose.yml as /app/config.yaml.
# Usage: docker compose up --build
# Then: curl http://localhost:8080/v1/chat/completions ...

gateway:
  host: "0.0.0.0"
  port: 8080
  strategy: "least_inflight"

health:
  interval_s: 5
  timeout_s: 2
  fail_threshold: 2
  success_threshold: 1

logging:
  level: "INFO"
  jsonl_path: "./meridian_requests.jsonl"

backends:
  - name: "fast"
    url: "http://backend-fast:9001"
    engine: "mock"
    model: "demo-model"
    weight: 80
    tags: ["fast"]
    health_endpoint: "/v1/models"

  - name: "slow"
    url: "http://backend-slow:9002"
    engine: "mock"
    model: "demo-model"
    weight: 20
    tags: ["cheap"]
    health_endpoint: "/v1/models"
